[settings]
# 短按 CapsLock 是否切换系统大小写状态（true=切换, false=禁用）
hold_threshold_ms = 200
# 长按多久判定为修饰模式（毫秒）
tap_to_toggle = true

[mappings.cursor]

# ═══════════════════════════════════════════
# 光标移动 ——— ESDF 布局
# ═══════════════════════════════════════════
e = "Up"        # 光标上移
s = "Left"      # 光标左移
d = "Down"      # 光标下移
f = "Right"     # 光标右移
w = "Home"      # 跳转到行首
r = "End"       # 跳转到行尾
[settings]
# 短按 CapsLock 是否切换系统大小写状态（true=切换, false=禁用）
hold_threshold_ms = 200
# 长按多久判定为修饰模式（毫秒）
tap_to_toggle = true

[mappings.cursor]

# ═══════════════════════════════════════════
# 光标移动 ——— ESDF 布局
# ═══════════════════════════════════════════
e = "Up"        # 光标上移
s = "Left"      # 光标左移
d = "Down"      # 光标下移
f = "Right"     # 光标右移
w = "Home"      # 跳转到行首
r = "End"       # 跳转到行尾


# ═══════════════════════════════════════════
# 文本选中 ——— 从光标当前位置开始选中
# ═══════════════════════════════════════════
i = "Shift+Up"      # 向上选中
j = "Shift+Left"    # 向左选中
k = "Shift+Down"    # 向下选中
l = "Shift+Right"   # 向右选中
u = "Shift+Home"    # 选中到行首
o = "Shift+End"     # 选中到行尾


# ═══════════════════════════════════════════
# 删除
# ═══════════════════════════════════════════
n = "Backspace"                     # 删除光标左侧一个字符
m = "Delete"                        # 删除光标右侧一个字符
h = "Shift+End, Delete"             # 删除光标到行尾
y = "Shift+Home, Delete"            # 删除光标到行首
backspace = "Home, Shift+End, Delete" # 删除当前行


# ═══════════════════════════════════════════
# 选中整行/整词
# ═══════════════════════════════════════════
space = "Home, Shift+End"           # 选中当前行


# ═══════════════════════════════════════════
# 换行
# ═══════════════════════════════════════════
"alt+enter" = "Home, Enter, Up"     # 在上一行插入空行
enter = "End, Enter"                # 在下一行插入空行
